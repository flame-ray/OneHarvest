name: OneHarvest
version: 1.2.0-SNAPSHOT
main: me.oneharvest.OneHarvest
api-version: 1.21
authors:
  - FlameRay
description: 连锁挖矿、连锁砍树与范围挖掘插件。
commands:
  oh:
    description: Main command for OneHarvest
    usage: /oh <subcommand>
    permission: oneharvest.use
permissions:
  oneharvest.use:
    description: Allows using OneHarvest features
    default: true
  oneharvest.admin:
    description: Allows changing OneHarvest settings
    default: op
  oneharvest.reload:
    description: Allows reloading OneHarvest configuration
    default: op
  oneharvest.*:
    description: Grants every OneHarvest permission
    default: op
    children:
      oneharvest.use: true
      oneharvest.admin: true
      oneharvest.reload: true
