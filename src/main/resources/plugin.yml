name: OneHarvest
version: 1.1.0
main: me.oneharvest.OneHarvest
api-version: 1.21
authors:
  - FlameRay
description: A plugin for chain mining, tree felling, and area mining.
commands:
  oh:
    description: Main command for OneHarvest
    usage: /oh <subcommand>
    permission: oneharvest.use
permissions:
  oneharvest.use:
    description: Allows using OneHarvest features
    default: true
  oneharvest.admin:
    description: Allows changing OneHarvest settings
    default: op
  oneharvest.reload:
    description: Allows reloading OneHarvest configuration
    default: op
